services:
  backend-service:
    build: .
    command: gunicorn e_commerce_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - postgresql
      - redis
      # Keycloak removed from the MVP stack on 2026-05-21. SimpleJWT now
      # handles auth (see users/authentication.py::GuestOrJWTAuthentication).
      # - keycloak
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=true

  postgresql:
    # Switched from bitnami/postgresql to pgvector/pgvector:pg16 so the
    # `vector` extension is available for visual-search embeddings.
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro

  # ---------------------------------------------------------------------
  # Keycloak — disabled for the MVP. SimpleJWT covers register/login/refresh
  # without an extra service to boot. Re-enable this block (and the
  # `depends_on: keycloak` on backend-service, plus AUTHENTICATION_BACKENDS
  # / INSTALLED_APPS entries in settings.py) if we ever need enterprise SSO.
  # ---------------------------------------------------------------------
  # keycloak:
  #   image: bitnami/keycloak:latest
  #   environment:
  #     - KEYCLOAK_ADMIN=admin
  #     - KEYCLOAK_ADMIN_PASSWORD=admin
  #     - KC_SPI_THEME_STATIC_MAX_AGE=-1
  #     - KC_SPI_THEME_CACHE_THEMES=false
  #     - KC_DB=postgres
  #     - KC_DB_URL=jdbc:postgresql://postgresql:5432/${KEYCLOAK_DB_NAME}
  #     - KC_DB_USERNAME=${POSTGRES_USER}
  #     - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
  #   env_file:
  #     - .env
  #   depends_on:
  #     - postgresql
  #   ports:
  #     - "8083:8080"

  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/bitnami/redis

  celery:
    build: .
    command: celery -A e_commerce_backend worker -l info
    volumes:
      - .:/code
    depends_on:
      - redis
      - postgresql
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A e_commerce_backend beat -l info
    volumes:
      - .:/code
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  postgresql_data:
    driver: local
  redis_data:
    driver: local
